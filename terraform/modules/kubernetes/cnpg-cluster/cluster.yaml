apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-cluster
  namespace: db
spec:
  instances: 1

  storage:
    size: 2Gi

  # Bootstrap creates the superuser and the first DB.
  # The remaining three DBs are created via initdb.postInitSQL below.
  bootstrap:
    initdb:
      database: chist_users
      owner: dbadmin
      secret:
        name: cnpg-app-credentials
      postInitSQL:
        - CREATE DATABASE chist_reports   OWNER dbadmin;
        - CREATE DATABASE chist_verification OWNER dbadmin;
        - CREATE DATABASE chist_notif     OWNER dbadmin;

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
