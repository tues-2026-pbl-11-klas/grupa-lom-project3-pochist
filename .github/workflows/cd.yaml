name: CD - Deploy to ACR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      user:         ${{ steps.changes.outputs.user }}
      report:       ${{ steps.changes.outputs.report }}
      notification: ${{ steps.changes.outputs.notification }}
      verification: ${{ steps.changes.outputs.verification }}
      frontend:     ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            user:
              - 'backend/user-module/**'
            report:
              - 'backend/report-module/**'
            notification:
              - 'backend/notification-module/**'
            verification:
              - 'backend/verification-module/**'
            frontend:
              - 'frontend/**'

  build-user:
    name: Build & Push user-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.user == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR secrets from Azure Key Vault
        run: |
          ACR_REGISTRY=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-registry" --query "value" -o tsv)
          ACR_USERNAME=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-username" --query "value" -o tsv)
          ACR_PASSWORD=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-password" --query "value" -o tsv)
          echo "ACR_REGISTRY=$ACR_REGISTRY" >> $GITHUB_ENV
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/user-module
          file: ./backend/user-module/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/chist-user:latest
          cache-from: type=gha,scope=user
          cache-to: type=gha,mode=max,scope=user

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RG_NAME }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Restart deployment
        run: kubectl rollout restart deployment/user-module -n chist

  build-report:
    name: Build & Push report-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.report == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR secrets from Azure Key Vault
        run: |
          ACR_REGISTRY=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-registry" --query "value" -o tsv)
          ACR_USERNAME=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-username" --query "value" -o tsv)
          ACR_PASSWORD=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
