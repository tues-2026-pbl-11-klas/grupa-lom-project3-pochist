name: "CD - Build & Push Images"

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      user: ${{ steps.changes.outputs.user }}
      report: ${{ steps.changes.outputs.report }}
      notification: ${{ steps.changes.outputs.notification }}
      verification: ${{ steps.changes.outputs.verification }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            user:
              - 'backend/user-module/**'
            report:
              - 'backend/report-module/**'
            notification:
              - 'backend/notification-module/**'
            verification:
              - 'backend/verification-module/**'
            frontend:
              - 'frontend/**'

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service:
          - user
          - report
          - notification
          - verification
          - frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip unchanged service
        if: needs.detect-changes.outputs[matrix.service] != 'true'
        run: |
          echo "${{ matrix.service }} not changed"
          exit 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR info
        run: |
          ACR_NAME=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-name" \
            --query value -o tsv)

          ACR_LOGIN_SERVER=$(az acr show \
            --name "$ACR_NAME" \
            --query loginServer -o tsv)

          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        run: |
          echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Set build paths
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "BUILD_CONTEXT=frontend" >> $GITHUB_ENV
            echo "DOCKERFILE=frontend/Dockerfile" >> $GITHUB_ENV
          else
            echo "BUILD_CONTEXT=backend/${{ matrix.service }}-module" >> $GITHUB_ENV
            echo "DOCKERFILE=backend/${{ matrix.service }}-module/Dockerfile" >> $GITHUB_ENV
          fi

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/chist-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/chist-${{ matrix.service }}:latest

      - name: Update deployment manifest
        run: |
          DEPLOYMENT_FILE="k8s/${{ matrix.service }}/deployment.yaml"
          sed -i "s|image: .*|image: ${{ env.ACR_LOGIN_SERVER }}/chist-${{ matrix.service }}:${{ env.IMAGE_TAG }}|g" "$DEPLOYMENT_FILE"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/${{ matrix.service }}/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "Update ${{ matrix.service }} image to ${{ env.IMAGE_TAG }}"
          git push
