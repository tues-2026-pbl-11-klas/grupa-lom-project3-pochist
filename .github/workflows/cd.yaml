name: CD - Build & Push Images

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      user:         ${{ steps.changes.outputs.user }}
      report:       ${{ steps.changes.outputs.report }}
      notification: ${{ steps.changes.outputs.notification }}
      verification: ${{ steps.changes.outputs.verification }}
      frontend:     ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            user:
              - 'backend/user-module/**'
            report:
              - 'backend/report-module/**'
            notification:
              - 'backend/notification-module/**'
            verification:
              - 'backend/verification-module/**'
            frontend:
              - 'frontend/**'

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: [user, report, notification, verification, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Skip if service not changed
        if: needs.detect-changes.outputs[matrix.service] != 'true'
        run: |
          echo "Service '${{ matrix.service }}' did not change. Skipping."
          exit 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR secrets
        run: |
          ACR_REGISTRY=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-registry" --query "value" -o tsv)
          echo "ACR_REGISTRY=$ACR_REGISTRY" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}-module
          file: ./backend/${{ matrix.service }}-module/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/chist-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/chist-${{ matrix.service }}:latest

      - name: Commit new image tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          sed -i "s|image: .*$|image: ${{ env.ACR_REGISTRY }}/chist-${{ matrix.service }}:${{ env.IMAGE_TAG }}|" \
            k8s/${{ matrix.service }}/deployment.yaml
          git add k8s/${{ matrix.service }}/deployment.yaml
          git commit -m "Update ${{ matrix.service }} image to ${{ env.IMAGE_TAG }}"
          git push
