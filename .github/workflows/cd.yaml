name: CD - Deploy to ACR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      user: ${{ steps.changes.outputs.user }}
      report: ${{ steps.changes.outputs.report }}
      notification: ${{ steps.changes.outputs.notification }}
      verification: ${{ steps.changes.outputs.verification }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            user:
              - 'backend/user-module/**'
            report:
              - 'backend/report-module/**'
            notification:
              - 'backend/notification-module/**'
            verification:
              - 'backend/verification-module/**'
            frontend:
              - 'frontend/**'

  build-user:
    name: Build & Push user-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.user == 'true'
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials from Key Vault
        id: acr
        run: |
          echo "registry=$(az keyvault secret show --vault-name kv-chist-dev --name acr-registry --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "username=$(az keyvault secret show --vault-name kv-chist-dev --name acr-username --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az keyvault secret show --vault-name kv-chist-dev --name acr-password --query value -o tsv)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.registry }}
          username: ${{ steps.acr.outputs.username }}
          password: ${{ steps.acr.outputs.password }}

      - id: tags
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/user-module
          file: ./backend/user-module/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.registry }}/chist-user:latest
            ${{ steps.acr.outputs.registry }}/chist-user:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=user
          cache-to: type=gha,mode=max,scope=user

  build-report:
    name: Build & Push report-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.report == 'true'
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials from Key Vault
        id: acr
        run: |
          echo "registry=$(az keyvault secret show --vault-name kv-chist-dev --name acr-registry --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "username=$(az keyvault secret show --vault-name kv-chist-dev --name acr-username --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az keyvault secret show --vault-name kv-chist-dev --name acr-password --query value -o tsv)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.registry }}
          username: ${{ steps.acr.outputs.username }}
          password: ${{ steps.acr.outputs.password }}

      - id: tags
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/report-module
          file: ./backend/report-module/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.registry }}/chist-report:latest
            ${{ steps.acr.outputs.registry }}/chist-report:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=report
          cache-to: type=gha,mode=max,scope=report

  build-notification:
    name: Build & Push notification-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true'
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials from Key Vault
        id: acr
        run: |
          echo "registry=$(az keyvault secret show --vault-name kv-chist-dev --name acr-registry --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "username=$(az keyvault secret show --vault-name kv-chist-dev --name acr-username --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az keyvault secret show --vault-name kv-chist-dev --name acr-password --query value -o tsv)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.registry }}
          username: ${{ steps.acr.outputs.username }}
          password: ${{ steps.acr.outputs.password }}

      - id: tags
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/notification-module
          file: ./backend/notification-module/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.registry }}/chist-notification:latest
            ${{ steps.acr.outputs.registry }}/chist-notification:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=notification
          cache-to: type=gha,mode=max,scope=notification

  build-verification:
    name: Build & Push verification-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.verification == 'true'
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials from Key Vault
        id: acr
        run: |
          echo "registry=$(az keyvault secret show --vault-name kv-chist-dev --name acr-registry --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "username=$(az keyvault secret show --vault-name kv-chist-dev --name acr-username --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az keyvault secret show --vault-name kv-chist-dev --name acr-password --query value -o tsv)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.registry }}
          username: ${{ steps.acr.outputs.username }}
          password: ${{ steps.acr.outputs.password }}

      - id: tags
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/verification-module
          file: ./backend/verification-module/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.registry }}/chist-verification:latest
            ${{ steps.acr.outputs.registry }}/chist-verification:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=verification
          cache-to: type=gha,mode=max,scope=verification

  build-frontend:
    name: Build & Push frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials from Key Vault
        id: acr
        run: |
          echo "registry=$(az keyvault secret show --vault-name kv-chist-dev --name acr-registry --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "username=$(az keyvault secret show --vault-name kv-chist-dev --name acr-username --query value -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az keyvault secret show --vault-name kv-chist-dev --name acr-password --query value -o tsv)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.registry }}
          username: ${{ steps.acr.outputs.username }}
          password: ${{ steps.acr.outputs.password }}

      - id: tags
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.registry }}/chist-frontend:latest
            ${{ steps.acr.outputs.registry }}/chist-frontend:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  update-helm-tags:
    name: Update Helm Image Tags
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-user
      - build-report
      - build-notification
      - build-verification
      - build-frontend
    if: |
      always() && (
        needs.build-user.result == 'success' ||
        needs.build-report.result == 'success' ||
        needs.build-notification.result == 'success' ||
        needs.build-verification.result == 'success' ||
        needs.build-frontend.result == 'success'
      )
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set SHA tag
        id: sha
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update user-module tag
        if: needs.build-user.result == 'success'
        run: |
          sed -i "s/^  tag: .*/  tag: '${{ steps.sha.outputs.sha_tag }}'/" helm/user-module-chart/values.yaml

      - name: Update report-module tag
        if: needs.build-report.result == 'success'
        run: |
          sed -i "s/^  tag: .*/  tag: '${{ steps.sha.outputs.sha_tag }}'/" helm/report-module-chart/values.yaml

      - name: Update notification-module tag
        if: needs.build-notification.result == 'success'
        run: |
          sed -i "s/^  tag: .*/  tag: '${{ steps.sha.outputs.sha_tag }}'/" helm/notification-module-chart/values.yaml

      - name: Update verification-module tag
        if: needs.build-verification.result == 'success'
        run: |
          sed -i "s/^  tag: .*/  tag: '${{ steps.sha.outputs.sha_tag }}'/" helm/verification-module-chart/values.yaml

      - name: Update frontend tag
        if: needs.build-frontend.result == 'success'
        run: |
          sed -i "s/^  tag: .*/  tag: '${{ steps.sha.outputs.sha_tag }}'/" helm/frontend-chart/values.yaml

      - name: Commit and push updated tags
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add helm/*/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.sha.outputs.sha_tag }} [skip ci]"
          git push