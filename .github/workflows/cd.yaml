          password: ${{ env.ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/verification-module
          file: ./backend/verification-module/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/chist-verification:latest
          cache-from: type=gha,scope=verification
          cache-to: type=gha,mode=max,scope=verification

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RG_NAME }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Restart deployment
        run: kubectl rollout restart deployment/verification-module -n chist

  build-frontend:
    name: Build & Push frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR secrets from Azure Key Vault
        run: |
