          echo "ACR_REGISTRY=$ACR_REGISTRY" >> $GITHUB_ENV
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/report-module
          file: ./backend/report-module/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/chist-report:latest
          cache-from: type=gha,scope=report
          cache-to: type=gha,mode=max,scope=report

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RG_NAME }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Restart deployment
        run: kubectl rollout restart deployment/report-module -n chist

  build-notification:
    name: Build & Push notification-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR secrets from Azure Key Vault
        run: |
          ACR_REGISTRY=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-registry" --query "value" -o tsv)
          ACR_USERNAME=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-username" --query "value" -o tsv)
          ACR_PASSWORD=$(az keyvault secret show \
            --vault-name "${{ secrets.AZURE_KEY_VAULT_NAME }}" \
            --name "acr-password" --query "value" -o tsv)
          echo "ACR_REGISTRY=$ACR_REGISTRY" >> $GITHUB_ENV
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend/notification-module
          file: ./backend/notification-module/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/chist-notification:latest
          cache-from: type=gha,scope=notification
          cache-to: type=gha,mode=max,scope=notification

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RG_NAME }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Restart deployment
        run: kubectl rollout restart deployment/notification-module -n chist

  build-verification:
    name: Build & Push verification-module
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.verification == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch ACR secrets from Azure Key Vault
        run: |
          ACR_REGISTRY=$(az keyvault secret show \
