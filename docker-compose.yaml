services:

  db:
    image: postgres:16-alpine
    container_name: chist-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: chist-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  user-module:
    build:
      context: ./backend/user-module
      dockerfile: Dockerfile
    container_name: chist-user
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT_USER: 8080
      DB_URL: jdbc:postgresql://db:5432/appdb
      DB_USERNAME: appuser
      DB_PASSWORD: localpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: local-dev-secret-key-minimum-32-chars-long
      JWT_EXPIRATION: 86400000

  report-module:
    build:
      context: ./backend/report-module
      dockerfile: Dockerfile
    container_name: chist-report
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT_REPORT: 8081
      DB_URL: jdbc:postgresql://db:5432/appdb
      DB_USERNAME: appuser
      DB_PASSWORD: localpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev
      USER_SERVICE_URL: http://user-module:8080

  notification-module:
    build:
      context: ./backend/notification-module
      dockerfile: Dockerfile
    container_name: chist-notification
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT_NOTIFICATION: 8082
      DB_URL: jdbc:postgresql://db:5432/appdb
      DB_USERNAME: appuser
      DB_PASSWORD: localpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev
      GOOGLE_MAPS_API_KEY: local-fake-maps-key
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: dev@local.com
      SPRING_MAIL_PASSWORD: unused
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: false
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chist-frontend
    ports:
      - "3000:80"
    depends_on:
      - user-module
      - report-module
      - notification-module

volumes:
  postgres_data:
